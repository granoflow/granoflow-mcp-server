interface:
  display_name: Granoflow Project Definition
  short_description: Initialize or define a software project in three steps—Project Work, Style Guide Design Spec + tokens, App Shell—then Baseline and milestones. Not Initialize Granoflow.
  default_prompt: "Initialize this project (or define this project): complete Project Work from sources, lock stack capability, select capability-critical libraries, declare data persistence, lock skill routing, deliver Design Spec as Style Guide/Design Tokens boards (not full-page journey galleries), then Spec-fitted App Shell and Design Baseline under contract fidelity, write widgets.yaml after Baseline confirm, then hand off to milestone/task skills."
