interface:
  display_name: Granoflow Project Definition
  short_description: Initialize a software project—AI self-checks Project Work YAML, user browse-confirms Engineering Acceptance Pack (incl. folder structure), then user-selects Design Spec/Shell when UI applies. Not Initialize Granoflow.
  default_prompt: "Initialize this project (or define this project): complete Project Work from sources, lock stack/libraries/data/directory structure, AI self-check YAML, emit Engineering Acceptance Pack for user browse-confirm, then App-confirm Project Work; when UI applies deliver Design Spec Style Guide boards and Spec-fitted App Shell for user selection, write widgets.yaml after Baseline confirm; hand off to milestone/task skills."
